<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NemoSyn Library</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="page-header">
      <div>
        <h1>NemoSyn Library</h1>
        <p>Minimal, readable PDF reader for your paper collection.</p>
      </div>
    </header>

    <main class="layout">
      <section class="papers-section" aria-labelledby="papers-heading">
        <h2 id="papers-heading">Papers</h2>
        <label class="search-label" for="paper-search">Find paper</label>
        <input
          id="paper-search"
          class="search-input"
          type="search"
          placeholder="Search by title or description..."
        />
        <div id="papers-list" class="papers-grid" aria-live="polite"></div>
      </section>
    </main>

    <div id="reader-modal" class="reader-modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-paper-title">
      <div class="reader-backdrop" data-close-modal></div>
      <section class="reader-panel">
        <header class="reader-panel-header">
          <div>
            <p class="reader-kicker">Reader</p>
            <h2 id="modal-paper-title">Loading...</h2>
            <p id="page-progress" class="meta-text"></p>
          </div>
          <div class="toolbar-group">
            <button id="zoom-out" type="button" class="tool-button">-</button>
            <span id="zoom-level" class="meta-text">100%</span>
            <button id="zoom-in" type="button" class="tool-button">+</button>
            <button id="zoom-reset" type="button" class="tool-button">Auto fit</button>
            <button id="close-reader" type="button" class="tool-button close-button">Close</button>
          </div>
        </header>

        <div id="reader-scroll" class="reader-scroll" aria-live="polite">
          <p id="reader-status" class="reader-status">Loading PDF...</p>
          <div id="pdf-pages" class="pdf-pages hidden"></div>
        </div>
      </section>
    </div>

    <script src="./papers-data.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
